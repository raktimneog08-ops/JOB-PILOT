events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Map for WebSocket upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Resolver for dynamic DNS resolution (Google DNS)
    resolver 8.8.8.8 8.8.4.4 valid=30s;

    # HTTP Server: Redirect all traffic to HTTPS
    server {
        listen 80;
        server_name localhost; # Replace with your actual domain (e.g. unified-shell.com)

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name localhost; # Replace with your actual domain

        # SSL Certificates (Volume mounted from Certbot/Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/unified-shell.com/fullchain.pem; # Replace domain
        ssl_certificate_key /etc/letsencrypt/live/unified-shell.com/privkey.pem; # Replace domain

        # Modern SSL parameters
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Frontend shell proxy
        location / {
            proxy_pass http://shell:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # App 1: JD-RESUME
        location /apps/jd-resume/ {
            proxy_pass https://github.com/raktimneog08-ops/JD-RESUME/;
            proxy_set_header Host github.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' https://$host" always;
        }

        # App 2: Resume Shapeshifter
        location /apps/shapeshifter/ {
            proxy_pass https://resume-shapeshifter.onrender.com/;
            proxy_set_header Host resume-shapeshifter.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' https://$host" always;
            
            proxy_cookie_path / /apps/shapeshifter/;
        }

        # App 3: The Closer (Streamlit)
        location /apps/closer/ {
            proxy_pass https://the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app/;
            proxy_set_header Host the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' https://$host" always;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # App 3: Streamlit Websockets
        location /apps/closer/stream {
            proxy_pass https://the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app/stream;
            proxy_set_header Host the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
        
        location /apps/closer/_stcore/stream {
            proxy_pass https://the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app/_stcore/stream;
            proxy_set_header Host the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
