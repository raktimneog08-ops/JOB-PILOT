events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Map for WebSocket upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Resolver for dynamic DNS resolution (Google DNS)
    resolver 8.8.8.8 8.8.4.4 valid=30s;

    server {
        # Render assigns port dynamically, fallback to 10000
        listen 10000;
        server_name localhost;

        # Frontend shell proxy (internal Render service name)
        location / {
            # Render internal connection
            proxy_pass http://shell:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # App 1: JD-RESUME
        location /apps/jd-resume/ {
            proxy_pass https://github.com/raktimneog08-ops/JD-RESUME/;
            proxy_set_header Host github.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' https://$host" always;
        }

        # App 2: Resume Shapeshifter
        location /apps/shapeshifter/ {
            proxy_pass https://resume-shapeshifter.onrender.com/;
            proxy_set_header Host resume-shapeshifter.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' https://$host" always;
            
            proxy_cookie_path / /apps/shapeshifter/;
        }
    }
}
