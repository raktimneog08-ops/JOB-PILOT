events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Map to determine connection header based on upgrade presence
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Resolver for dynamic DNS resolution of external endpoints (Google DNS)
    resolver 8.8.8.8 8.8.4.4 valid=30s;

    server {
        listen 8080;
        server_name localhost;

        # Frontend shell proxy
        location / {
            proxy_pass http://shell:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # App 1: JD-RESUME
        location /apps/jd-resume/ {
            # Route to JD-RESUME GitHub Pages or endpoint
            # We rewrite the URI if needed, or proxy directly
            proxy_pass https://github.com/raktimneog08-ops/JD-RESUME/;
            proxy_set_header Host github.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Strip restrictions to allow framing
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:8080 http://localhost:3000" always;
        }

        # App 2: Resume Shapeshifter
        location /apps/shapeshifter/ {
            proxy_pass https://resume-shapeshifter.onrender.com/;
            proxy_set_header Host resume-shapeshifter.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Strip restrictions to allow framing
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:8080 http://localhost:3000" always;
            
            # Handle cookies and relative path rewrites if needed
            proxy_cookie_path / /apps/shapeshifter/;
        }

        # App 3: The Closer (Streamlit)
        location /apps/closer/ {
            proxy_pass https://the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app/;
            proxy_set_header Host the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket support for Streamlit
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Strip restrictions to allow framing
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:8080 http://localhost:3000" always;

            # Ensure long timeout for persistent WebSockets
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # App 3: The Closer Streamlit WebSocket Route
        location /apps/closer/stream {
            proxy_pass https://the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app/stream;
            proxy_set_header Host the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
        
        # App 3: Alternative Streamlit WebSocket route (_stcore/stream)
        location /apps/closer/_stcore/stream {
            proxy_pass https://the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app/_stcore/stream;
            proxy_set_header Host the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
