name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.9.0'
        cache: 'npm'
        cache-dependency-path: './shell/package-lock.json'

    - name: Install Shell Dependencies
      run: |
        cd shell
        npm ci

    - name: Build Next.js Production Bundle
      run: |
        cd shell
        npm run build

    - name: Install Playwright Browsers
      run: |
        cd shell
        npx playwright install --with-deps chromium

    - name: Run E2E Integration Tests
      run: |
        cd shell
        npx playwright test

    - name: Build production Docker image
      run: |
        docker build -t unified-shell:latest -f shell/Dockerfile .

    - name: Build gateway Docker image
      run: |
        docker build -t gateway:latest -f gateway/Dockerfile .
