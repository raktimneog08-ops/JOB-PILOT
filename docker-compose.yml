version: '3.8'

services:
  shell:
    build:
      context: ./shell
      dockerfile: Dockerfile.dev
    container_name: integration-shell
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - JD_RESUME_URL=https://github.com/raktimneog08-ops/JD-RESUME
      - SHAPESHIFTER_URL=https://resume-shapeshifter.onrender.com
      - THE_CLOSER_URL=https://the-closer-m59fkvodcfreb8yjtdqkaw.streamlit.app
    volumes:
      - ./shell:/app
      - /app/node_modules
      - /app/.next

  gateway:
    image: nginx:alpine
    container_name: integration-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shell
