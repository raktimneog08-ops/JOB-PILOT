services:
  # 1. Next.js Shell (Private Service - accessible only inside Render network)
  - type: pserv
    name: shell
    env: docker
    dockerfilePath: shell/Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: JD_RESUME_URL
        value: https://github.com/raktimneog08-ops/JD-RESUME
      - key: SHAPESHIFTER_URL
        value: https://resume-shapeshifter.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://your-custom-gateway-domain.onrender.com # Change to public gateway URL

  # 2. Public Nginx Gateway Web Service (SSL managed by Render)
  - type: web
    name: gateway
    env: docker
    dockerfilePath: gateway/Dockerfile.render
    port: 80
