services:
  # 1. Next.js Shell (Web Service - configured on Free plan)
  - type: web
    name: shell
    plan: free
    env: docker
    dockerfilePath: shell/Dockerfile
    envVars:
      - key: PORT
        value: '3000'
      - key: NODE_ENV
        value: production
      - key: JD_RESUME_URL
        value: https://github.com/raktimneog08-ops/JD-RESUME
      - key: NEXT_PUBLIC_SHAPESHIFTER_URL
        value: https://resume-shapeshifter.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://your-custom-gateway-domain.onrender.com # Change to public gateway URL
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false

